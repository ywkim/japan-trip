<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본 여행 의사결정 대시보드</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #222;
    --muted: #666;
    --border: #ddd;
    --accent: #d33;
    --bar: #d33;
    --bar-bg: #f0e0e0;
    --table-stripe: #f4f4f4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --fg: #eee;
      --muted: #999;
      --border: #333;
      --accent: #ff6464;
      --bar: #ff6464;
      --bar-bg: #3a2424;
      --table-stripe: #232323;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "AppleGothic", sans-serif;
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    padding: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
  h2 { font-size: 1.1rem; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
  .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); text-align: left; }
  th { background: var(--table-stripe); font-weight: 600; }
  tbody tr:nth-child(even) { background: var(--table-stripe); }
  input[type="number"] {
    width: 4rem;
    padding: 0.2rem 0.3rem;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 0.85rem;
  }
  input[type="range"] { width: 8rem; vertical-align: middle; }
  .weight-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; padding: 0.3rem 0; }
  .weight-row label { min-width: 7rem; }
  .weight-val { min-width: 2.5rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .weight-sum { color: var(--muted); font-size: 0.85rem; margin-top: 0.5rem; }
  .weight-sum.warn { color: var(--accent); }
  .ranking { margin-top: 1rem; }
  .rank-row {
    display: grid;
    grid-template-columns: 2rem 8rem 1fr 4rem;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0;
  }
  .rank-num { font-weight: 600; text-align: right; }
  .bar-bg {
    background: var(--bar-bg);
    height: 1.2rem;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    background: var(--bar);
    height: 100%;
    transition: width 0.2s ease;
  }
  .rank-score { font-variant-numeric: tabular-nums; text-align: right; color: var(--muted); }
  .legend { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }
  .actions { margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
  button {
    padding: 0.4rem 0.8rem;
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  button:hover { border-color: var(--accent); }
  details { margin-top: 1rem; }
  summary { cursor: pointer; color: var(--muted); font-size: 0.85rem; }
  pre { background: var(--table-stripe); padding: 0.8rem; border-radius: 3px; overflow-x: auto; font-size: 0.8rem; }
</style>
</head>
<body>

<h1>일본 여행 의사결정 대시보드</h1>
<div class="meta">MCDA (Multi-Criteria Decision Analysis) 가중평가. 점수 1~10, 가중치 합계 1.0.</div>

<h2>1. 가중치 조정</h2>
<div id="weights"></div>
<div id="weight-sum" class="weight-sum"></div>

<h2>2. 후보별 점수 입력</h2>
<div style="overflow-x: auto;">
  <table id="score-table">
    <thead><tr id="score-head"></tr></thead>
    <tbody id="score-body"></tbody>
  </table>
</div>
<div class="legend">점수 1~10 (높을수록 좋음). 비어두면 해당 기준 가중치는 정규화에서 제외.</div>

<h2>3. 종합 점수 순위</h2>
<div class="ranking" id="ranking"></div>

<div class="actions">
  <button id="reset-weights">가중치 초기화</button>
  <button id="export">JSON 내보내기</button>
</div>

<details>
  <summary>현재 데이터 (JSON)</summary>
  <pre id="export-area"></pre>
</details>

<script>
// data/decision.json과 동기화 — 단일 출처는 JSON 파일
const DECISION = {
  "trip": {
    "destination_country": "일본",
    "travelers": ["영욱", "소연", "시부", "시모"],
    "travelers_composition": "부부 2인 + 시부모 2인 (총 4인)",
    "duration_days_options": [4, 5, 6, 7],
    "budget_krw_options": [3000000, 5000000, 7000000],
    "season_options": ["2026-05", "2026-06", "2026-09", "2026-10"]
  },
  "criteria": [
    { "id": "cost",            "name": "비용",         "weight": 0.20, "direction": "lower_is_better" },
    { "id": "schedule_fit",    "name": "일정 적합성",  "weight": 0.15, "direction": "higher_is_better" },
    { "id": "physical_burden", "name": "신체 부담",    "weight": 0.15, "direction": "lower_is_better" },
    { "id": "experience",      "name": "경험 가치",    "weight": 0.20, "direction": "higher_is_better" },
    { "id": "family_fit",      "name": "가족 적합성",  "weight": 0.10, "direction": "higher_is_better" },
    { "id": "medical_access",  "name": "의료 접근성",  "weight": 0.10, "direction": "higher_is_better" },
    { "id": "seasonality",     "name": "계절성",       "weight": 0.10, "direction": "higher_is_better" }
  ],
  "candidates": [
    { "id": "tokyo",   "name": "도쿄",                "scores": {} },
    { "id": "osaka",   "name": "오사카",              "scores": {} },
    { "id": "kyoto",   "name": "교토",                "scores": { "cost": 7, "schedule_fit": 8, "physical_burden": 6, "experience": 9, "family_fit": 8, "medical_access": 6, "seasonality": 9 } },
    { "id": "sapporo", "name": "삿포로 (홋카이도)",   "scores": {} },
    { "id": "okinawa", "name": "오키나와",            "scores": {} },
    { "id": "fukuoka", "name": "후쿠오카",            "scores": {} }
  ]
};

const STORAGE_KEY = "japan-trip-overrides";

// ----- 상태 -----
const state = {
  weights: Object.fromEntries(DECISION.criteria.map(c => [c.id, c.weight])),
  scores: Object.fromEntries(DECISION.candidates.map(c => [c.id, { ...c.scores }]))
};

// localStorage 복원
try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
  if (saved) {
    if (saved.weights) Object.assign(state.weights, saved.weights);
    if (saved.scores) {
      for (const [cid, s] of Object.entries(saved.scores)) {
        state.scores[cid] = { ...(state.scores[cid] || {}), ...s };
      }
    }
  }
} catch (e) {}

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ----- 가중치 UI -----
function renderWeights() {
  const wrap = document.getElementById("weights");
  wrap.innerHTML = "";
  for (const c of DECISION.criteria) {
    const row = document.createElement("div");
    row.className = "weight-row";
    row.innerHTML = `
      <label>${c.name}</label>
      <input type="range" min="0" max="1" step="0.01" value="${state.weights[c.id]}" data-cid="${c.id}">
      <span class="weight-val" id="wval-${c.id}">${state.weights[c.id].toFixed(2)}</span>
    `;
    wrap.appendChild(row);
  }
  wrap.querySelectorAll('input[type="range"]').forEach(input => {
    input.addEventListener("input", e => {
      const cid = e.target.dataset.cid;
      state.weights[cid] = parseFloat(e.target.value);
      document.getElementById(`wval-${cid}`).textContent = state.weights[cid].toFixed(2);
      updateWeightSum();
      renderRanking();
      persist();
    });
  });
  updateWeightSum();
}

function updateWeightSum() {
  const sum = Object.values(state.weights).reduce((a, b) => a + b, 0);
  const el = document.getElementById("weight-sum");
  el.textContent = `합계: ${sum.toFixed(2)} (정규화 후 적용)`;
  el.classList.toggle("warn", Math.abs(sum - 1.0) > 0.01);
}

// ----- 점수 입력 UI -----
function renderScoreTable() {
  const head = document.getElementById("score-head");
  head.innerHTML = "<th>후보</th>" + DECISION.criteria.map(c => `<th>${c.name}</th>`).join("");
  const body = document.getElementById("score-body");
  body.innerHTML = "";
  for (const cand of DECISION.candidates) {
    const tr = document.createElement("tr");
    const cells = [`<td>${cand.name}</td>`];
    for (const crit of DECISION.criteria) {
      const v = state.scores[cand.id]?.[crit.id] ?? "";
      cells.push(`<td><input type="number" min="1" max="10" data-cand="${cand.id}" data-crit="${crit.id}" value="${v}"></td>`);
    }
    tr.innerHTML = cells.join("");
    body.appendChild(tr);
  }
  body.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", e => {
      const { cand, crit } = e.target.dataset;
      const v = e.target.value;
      if (!state.scores[cand]) state.scores[cand] = {};
      if (v === "") {
        delete state.scores[cand][crit];
      } else {
        state.scores[cand][crit] = parseFloat(v);
      }
      renderRanking();
      persist();
    });
  });
}

// ----- 종합 점수 계산 -----
function computeScores() {
  const sumW = Object.values(state.weights).reduce((a, b) => a + b, 0) || 1;
  const result = [];
  for (const cand of DECISION.candidates) {
    const scores = state.scores[cand.id] || {};
    let total = 0, used = 0;
    for (const crit of DECISION.criteria) {
      if (scores[crit.id] != null) {
        total += scores[crit.id] * (state.weights[crit.id] / sumW);
        used += state.weights[crit.id] / sumW;
      }
    }
    result.push({
      name: cand.name,
      score: used > 0 ? total / used : null,
      coverage: used
    });
  }
  return result.sort((a, b) => (b.score ?? -1) - (a.score ?? -1));
}

// ----- 순위 UI -----
function renderRanking() {
  const wrap = document.getElementById("ranking");
  const results = computeScores();
  const max = 10;
  wrap.innerHTML = "";
  results.forEach((r, i) => {
    const row = document.createElement("div");
    row.className = "rank-row";
    if (r.score == null) {
      row.innerHTML = `
        <div class="rank-num">-</div>
        <div>${r.name}</div>
        <div class="bar-bg"></div>
        <div class="rank-score">N/A</div>
      `;
    } else {
      const pct = (r.score / max) * 100;
      const cov = (r.coverage * 100).toFixed(0);
      row.innerHTML = `
        <div class="rank-num">${i + 1}</div>
        <div>${r.name}</div>
        <div class="bar-bg"><div class="bar-fill" style="width: ${pct}%"></div></div>
        <div class="rank-score">${r.score.toFixed(2)}<br><span style="font-size:0.7rem;">cov ${cov}%</span></div>
      `;
    }
    wrap.appendChild(row);
  });
  document.getElementById("export-area").textContent = JSON.stringify(state, null, 2);
}

// ----- 액션 -----
document.getElementById("reset-weights").addEventListener("click", () => {
  for (const c of DECISION.criteria) state.weights[c.id] = c.weight;
  persist();
  renderWeights();
  renderRanking();
});
document.getElementById("export").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "japan-trip-state.json";
  a.click();
  URL.revokeObjectURL(url);
});

// ----- 초기 렌더 -----
renderWeights();
renderScoreTable();
renderRanking();
</script>

</body>
</html>
