name: validate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install uv + Python
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          python-version: "3.11"
          enable-cache: true

      - name: install dependencies (locked)
        run: uv sync --locked

      - name: build_index.py (산출물은 gitignore — 검증 전에 생성)
        run: uv run python scripts/build_index.py

      - name: unit tests
        run: uv run python -m unittest discover -s tests -v

      - name: score.py runs
        run: uv run python scripts/score.py

      - name: budget.py runs
        run: uv run python scripts/budget.py

      - name: validate.py (price fields, stale prices, SYNC paths, GitHub link ban)
        run: uv run python scripts/validate.py
